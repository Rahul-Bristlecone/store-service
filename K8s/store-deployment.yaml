apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-service
  template:
    metadata:
      labels:
        app: store-service
    spec:
      containers:
      - name: store-service
        image: sharma92/daemons:store-service
        envFrom:
        - secretRef:
            name: mysql-secret
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: store-service
spec:
  type: NodePort
  selector:
    app: store-service
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30002